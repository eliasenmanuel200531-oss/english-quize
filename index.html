<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>英語が伸びるサイト</title>
  <style>
  :root{
    --bg:#0b1020;
    --card:#111a33;
    --text:#e8ecff;
    --muted:#aab3d6;
    --accent:#6ea8ff;
    --danger:#ff6b6b;
  }
  body{
    margin:0;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    background: linear-gradient(180deg, var(--bg), #070a14);
    color: var(--text);
  }
  .wrap{
    max-width: 900px;
    margin: 0 auto;
    padding: 24px 16px;
  }
  h1,h2{ margin: 8px 0 16px; }
  p{ color: var(--muted); line-height:1.6; }

  /* ボタン/リンクをボタン化 */
  .btn, a.btn, button{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    padding: 12px 14px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,.12);
    background: rgba(255,255,255,.06);
    color: var(--text);
    text-decoration:none;
    cursor:pointer;
    transition: transform .05s ease, background .2s ease;
  }
  .btn:hover, a.btn:hover, button:hover{
    background: rgba(255,255,255,.10);
  }
  .btn:active, a.btn:active, button:active{
    transform: translateY(1px);
  }
  .primary{
    background: rgba(110,168,255,.18);
    border-color: rgba(110,168,255,.35);
  }
  .primary:hover{ background: rgba(110,168,255,.26); }

  /* カード */
  .grid{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
    gap: 12px;
    margin-top: 14px;
  }
  .card{
    background: rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.10);
    border-radius:16px;
    padding:14px;
  }
  .card small{ color: var(--muted); }

  /* クイズ */
  #question{
    font-size: 20px;
    margin-bottom: 14px;
  }
  .choices{
    display:grid;
    grid-template-columns: 1fr;
    gap: 10px;
  }
  .choice{
    width: 100%;
    text-align:left;
  }
  #result{
    margin-top: 12px;
    font-weight: 700;
  }
  #explain{
    margin-top: 10px;
    padding: 12px;
    border-radius: 12px;
    background: rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.10);
  }
  .hidden{ display:none; }

  /* フッターリンク */
  .links{
    margin-top: 18px;
    display:flex;
    gap:10px;
    flex-wrap: wrap;
  }
</style>
</head>
<body>

<div class="wrap">
  <h1>英語を「解いて」伸ばす</h1>
  <p>
    間違えた問題をそのままにしない。<br>
    正答率と弱点が自動で分かる英語学習サイト。
  </p>

  <div class="grid">
    <div class="card">
      <h3>✔ 文法30問</h3>
      <small>be動詞 / 時制 / 助動詞</small>
    </div>
    <div class="card">
      <h3>✔ 正答率を自動記録</h3>
      <small>成長がグラフで見える</small>
    </div>
    <div class="card">
      <h3>✔ 復習に特化</h3>
      <small>Proで間違いが残る</small>
    </div>
  </div>

  <div class="links">
    <a class="btn primary" href="英語の基礎/eigo.html">
      今すぐ解いてみる（無料）
    </a>
  </div>

  <p style="margin-top:16px;">
    ※アカウント登録なし・無料で使えます
  </p>
</div>

</body>
</html>
