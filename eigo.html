<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="./index.css">
    <title>Document</title>
    <style>
  :root{
    --bg:#0b1020;
    --card:#111a33;
    --text:#e8ecff;
    --muted:#aab3d6;
    --accent:#6ea8ff;
    --danger:#ff6b6b;
  }
  body{
    margin:0;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    background: linear-gradient(180deg, var(--bg), #070a14);
    color: var(--text);
  }
  .wrap{
    max-width: 900px;
    margin: 0 auto;
    padding: 24px 16px;
  }
  h1,h2{ margin: 8px 0 16px; }
  p{ color: var(--muted); line-height:1.6; }

  /* ボタン/リンクをボタン化 */
  .btn, a.btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    padding: 12px 14px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,.12);
    background: rgba(255,255,255,.06);
    color: var(--text);
    text-decoration:none;
    cursor:pointer;
    transition: transform .05s ease, background .2s ease;
  }
  .btn:hover, a.btn:hover, button:hover{
    background: rgba(255,255,255,.10);
  }
  .btn:active, a.btn:active, button:active{
    transform: translateY(1px);
  }
  .primary{
    background: rgba(110,168,255,.18);
    border-color: rgba(110,168,255,.35);
  }
  .primary:hover{ background: rgba(110,168,255,.26); }

  /* カード */
  .grid{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
    gap: 12px;
    margin-top: 14px;
  }
  .card{
    background: rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.10);
    border-radius:16px;
    padding:14px;
  }
  .card small{ color: var(--muted); }

  /* クイズ */
 /* ===== クイズエリア ===== */
#question {
  font-size: 22px;
  margin-bottom: 20px;
  line-height: 1.5;
}

/* ===== 選択肢 ===== */
.choices {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.choice {
  width: 100%;
  padding: 16px;
  font-size: 16px;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.06);
  color: white;
  cursor: pointer;
  transition: all 0.15s ease;
  text-align: left;
    min-height: 54px;
  font-weight: 700;
  box-shadow: 0 8px 24px rgba(0,0,0,.25);
}
.choice[disabled]{
  opacity: 0.8;
  cursor: not-allowed;
}

/* ホバー */
.choice:hover {
  background: rgba(110,168,255,0.2);
  border-color: rgba(110,168,255,0.5);
}

/* 押したとき */
.choice:active {
  transform: scale(0.98);
}

/* 正解 */
.correct {
  background: rgba(0, 200, 100, 0.25);
  border-color: rgba(0, 255, 150, 0.6);
}
@keyframes pop {
  0% { transform: scale(1); }
  50% { transform: scale(1.08); }
  100% { transform: scale(1); }
}

.correct{
  background: rgba(0, 200, 100, 0.25);
  border-color: rgba(0, 255, 150, 0.6);
  animation: pop 0.3s ease;
}

/* 不正解 */
.wrong {
  background: rgba(255, 0, 0, 0.25);
  border-color: rgba(255, 0, 0, 0.6);
}
@keyframes shake {
  0% { transform: translateX(0); }
  25% { transform: translateX(-4px); }
  50% { transform: translateX(4px); }
  75% { transform: translateX(-4px); }
  100% { transform: translateX(0); }
}

.wrong{
  background: rgba(255, 0, 0, 0.25);
  border-color: rgba(255, 0, 0, 0.6);
  animation: shake 0.3s ease;
}
  #result{
    margin-top: 12px;
    font-weight: 700;
  }
  #explain{
    margin-top: 10px;
    padding: 12px;
    border-radius: 12px;
    background: rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.10);
  }
  .hidden{ display:none; }

  /* フッターリンク */
  .links{
    margin-top: 18px;
    display:flex;
    gap:10px;
    flex-wrap: wrap;
  }
  .progress-bar {
  width: 100%;
  height: 10px;
  background: rgba(255,255,255,0.1);
  border-radius: 10px;
  margin-bottom: 16px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #6ea8ff, #4cc9f0);
  transition: width 0.3s ease;
}      
@media (max-width: 600px) {
  #question {
    font-size: 18px;
  }

  .choice {
    font-size: 15px;
    padding: 14px;
  }

  body {
    padding: 12px;
  }
}
</style>
</head>
<body>
  <p>クリック回数: <span id="">0</span></p>
   <div class="progress-bar">
  <div class="progress-fill" id="progressFill"></div>
</div>
<p id="progress"></p>
  <a>あ</a>  
   <p id="question"></p>
    <div class="choices">
 <button class="choice"></button>
 <button class="choice"></button>
 <button class="choice"></button>
 <button class="choice"></button>
 </div>
 <p id="result"></p>
 <p id="explain" class="hidden"></p>
 <button id="nextBtn" class="btn primary" style="display:none;">次へ</button>
<button id="reviewBtn" class="btn" style="display:none;">間違いだけ解く（Pro）</button>
 <a href="./graph.html" class="keka">結果へ</a>
 <a href="./pro.html" class="keka">Proにする</a>
  <script src="./index.js"></script>
</body>

</html>
